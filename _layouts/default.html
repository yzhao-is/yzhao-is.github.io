<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title | default: site.title }}</title>
  <script>
    // avoid blicking
    (function() {
      const saved = localStorage.getItem('theme');
      if (saved === 'dark' || (!saved && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.classList.add('dark');
      }
    })();
  </script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; }

    /* night mode */
    .dark body {
      background-color: #1c1b1a;
      color: #c8c3bc;
    }
    .dark h1, .dark h2, .dark h3, .dark h4 {
      color: #e8e4df;
    }
    .dark a:not(.no-dark) {
      color: #c8c3bc;
    }
    .dark a:not(.no-dark):hover {
      color: #e8e4df;
    }
    .dark .text-gray-600 { color: #9a9590 !important; }
    .dark .text-gray-500 { color: #8a8580 !important; }
    .dark .text-gray-900 { color: #e8e4df !important; }
    .dark .bg-white { background-color: #1c1b1a !important; }
    .dark .bg-gray-50 { background-color: #252423 !important; }
    .dark .bg-gray-100 { background-color: #2a2928 !important; }
    .dark .bg-gray-200 { background-color: #302f2e !important; }
    .dark .bg-blue-50 { background-color: #272625 !important; }
    .dark .text-blue-600 { color: #b8a98a !important; }
    .dark .border-gray-200 { border-color: #353433 !important; }
    .dark .hover\:bg-gray-50:hover { background-color: #252423 !important; }

    .theme-toggle {
      cursor: pointer;
      background: none;
      border: none;
      padding: 0.4rem;
      border-radius: 0.375rem;
      color: #6b7280;
      transition: color 0.2s;
    }
    .theme-toggle:hover { color: #1a1a1a; }
    .dark .theme-toggle { color: #9a9590; }
    .dark .theme-toggle:hover { color: #e8e4df; }
  </style>
</head>
<body class="min-h-screen flex flex-col bg-white">
  
  {% include navigation.html %}
  
  <main class="flex-grow px-4 py-8">
    {{ content }}
  </main>
  
  {% include footer.html %}

  <script>
    function toggleTheme() {
      const html = document.documentElement;
      const isDark = html.classList.toggle('dark');
      localStorage.setItem('theme', isDark ? 'dark' : 'light');
    }

    // autoswitch
    window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', (e) => {
      if (!localStorage.getItem('theme')) {
        document.documentElement.classList.toggle('dark', e.matches);
      }
    });
  </script>

</body>
</html>
